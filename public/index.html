<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected Page</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f3f7fb;
      color: #111827;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 18px;
    }

    .content {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border: 1px solid #dbe3ee;
      border-radius: 26px;
      padding: 34px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.15;
    }

    p {
      margin: 0 auto;
      max-width: 600px;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
    }

    .fake-area {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .fake-card {
      height: 120px;
      border-radius: 18px;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      border: 1px solid #e5e7eb;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      background: #111827;
      color: #ffffff;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.secondary {
      background: #2563eb;
    }

    .form-box {
      margin-top: 28px;
      padding: 22px;
      border-radius: 20px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      text-align: left;
    }

    .form-box h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .form-box input {
      width: 100%;
      margin-bottom: 12px;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .form-box button {
      width: 100%;
    }

    @media (max-width: 560px) {
      .fake-area {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">
      <span class="badge">Behavioral Protection Active</span>

      <h1>Protected Website Page</h1>

      <p>
        The behavioral security widget works invisibly in the background.
        It collects interaction behavior across the page and triggers verification
        only before protected actions such as Login, Register, or Submit.
      </p>

      <div class="fake-area">
        <div class="fake-card"></div>
        <div class="fake-card"></div>
        <div class="fake-card"></div>
      </div>

      <div class="actions">
        <a href="/login" class="btn" data-bc-protect="link">Login</a>
        <a href="/register" class="btn secondary" data-bc-protect="link">Register</a>
      </div>

      <div class="form-box">
        <h2>Protected Login Form</h2>

        <form data-bc-protect="submit" action="/login" method="POST">
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button class="btn" type="submit">Login with verification</button>
        </form>
      </div>
    </section>
  </main>

  <script
    src="/widget/behavior-captcha-widget.js"
    data-endpoint=""
    data-site-key="demo-site"
    data-auto-protect="true"
    data-debug="true">
  </script>
</body>
</html>
