<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected Page</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f3f7fb;
      color: #111827;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 18px;
    }

    .content {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border: 1px solid #dbe3ee;
      border-radius: 26px;
      padding: 34px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.15;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.7;
    }

    .fake-area {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .fake-card {
      height: 120px;
      border-radius: 18px;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      border: 1px solid #e5e7eb;
    }

    .captcha-overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(6px);
      z-index: 9999;
    }

    .captcha-overlay.active {
      display: flex;
    }

    .captcha-modal {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      animation: popIn 0.25s ease-out;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .bcaptcha-box {
      padding: 0;
      border: none;
      background: #ffffff;
    }

    .bcaptcha-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .bcaptcha-instruction {
      margin: 0 0 16px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }

    .bcaptcha-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .bcaptcha-item {
      border: 2px solid transparent;
      border-radius: 14px;
      overflow: hidden;
      background: #f8fafc;
      cursor: pointer;
      padding: 0;
    }

    .bcaptcha-item.selected {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    }

    .bcaptcha-item img {
      width: 100%;
      height: 120px;
      display: block;
      object-fit: cover;
    }

    .bcaptcha-verify {
      margin-top: 16px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      background: #111827;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .bcaptcha-result {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .bcaptcha-result.success {
      color: #166534;
    }

    .bcaptcha-result.error {
      color: #991b1b;
    }

    @media (max-width: 560px) {
      .fake-area {
        grid-template-columns: 1fr;
      }

      .bcaptcha-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="content">
      <span class="badge">Behavioral Protection Active</span>
      <h1>Protected Website Page</h1>
      <p>
        The behavioral security widget works silently in the background.
        Verification appears only when the system detects medium or high risk.
      </p>

      <div class="fake-area">
        <div class="fake-card"></div>
        <div class="fake-card"></div>
        <div class="fake-card"></div>
      </div>
    </section>
  </main>

  <div id="captcha-overlay" class="captcha-overlay">
    <div class="captcha-modal">
      <div id="behavior-captcha-container"></div>
    </div>
  </div>

  <script
    src="/widget/behavior-captcha-widget.js"
    data-endpoint=""
    data-site-key="demo-site">
  </script>

  <script>
    const captchaOverlay = document.getElementById("captcha-overlay");
    const captchaContainer = document.getElementById("behavior-captcha-container");

    let alreadyChecked = false;
    let captchaVisible = false;

    BehaviorCaptcha.init({
      endpoint: window.location.origin,
      siteKey: "demo-site",
      debug: true
    });

    function openCaptcha() {
      captchaVisible = true;
      captchaOverlay.classList.add("active");
    }

    function closeCaptcha() {
      captchaVisible = false;
      captchaOverlay.classList.remove("active");
      captchaContainer.innerHTML = "";
    }

    async function runBackgroundRiskCheck() {
      if (alreadyChecked || captchaVisible) return;

      const events = BehaviorCaptcha.getEvents();

      if (events.length < 30) {
        return;
      }

      alreadyChecked = true;

      try {
        const result = await BehaviorCaptcha.evaluate();
        console.log("Background ML result:", result);

        if (result.decision === "allow") {
          return;
        }

        if (result.decision === "show_captcha") {
          const challenge = await BehaviorCaptcha.loadCaptcha("medium");
          BehaviorCaptcha.renderCaptcha(captchaContainer, challenge);
          openCaptcha();
          return;
        }

        if (result.decision === "hard_captcha") {
          const challenge = await BehaviorCaptcha.loadCaptcha("hard");
          BehaviorCaptcha.renderCaptcha(captchaContainer, challenge);
          openCaptcha();
          return;
        }
      } catch (error) {
        console.error("Background verification failed:", error);
      }
    }

    setTimeout(runBackgroundRiskCheck, 6000);

    window.addEventListener("click", function () {
      setTimeout(runBackgroundRiskCheck, 1000);
    });

    window.addEventListener("scroll", function () {
      setTimeout(runBackgroundRiskCheck, 1000);
    });

    window.addEventListener("keydown", function () {
      setTimeout(runBackgroundRiskCheck, 1000);
    });

    window.addEventListener("behaviorcaptcha:verified", function () {
      closeCaptcha();
    });
  </script>
</body>
</html>
